packages:
  - "apps/*"
  - "packages/*"

# Keep local development native packages while also baking both production
# Linux/glibc architectures into the shared standalone Next.js artifact.
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc

overrides:
  glob@10.3.10: 10.5.0
  js-yaml@4.1.1: 4.2.0
  minimatch@9.0.3: 9.0.9
  postcss: 8.5.15
  tmp@0.1.0: 0.2.7
  tmp@0.0.33: 0.2.7
  uuid: 11.1.1
  ws@8.20.1: 8.21.0
  vite: 6.4.3

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - sharp
  - unrs-resolver
