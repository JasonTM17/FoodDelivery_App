name: Gitleaks Secret Scan

on:
  push:
    branches: [master, main, codex/batch4-integration]
  pull_request:
    branches: [master, main, codex/batch4-integration]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
