name: Trivy Vulnerability Scan

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build image
        run: docker build -t foodflow-backend:test ./backend
      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: foodflow-backend:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          # SARIF includes every severity by default; align the report and exit
          # policy with the release gate above instead of failing on MEDIUM/LOW.
          limit-severities-for-sarif: true
      - name: Upload results
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results-${{ github.run_id }}
          path: trivy-results.sarif
          retention-days: 14
