name: Integration Smoke Gate

on:
  push:
    branches: [master, main, codex/batch4-integration]
  pull_request:
    branches: [master, main, codex/batch4-integration]
  workflow_dispatch:
    inputs:
      skip_k6:
        description: 'Skip k6 load test'
        type: boolean
        default: false
      skip_lighthouse:
        description: 'Skip Lighthouse CI'
        type: boolean
        default: false

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Gate 1+2: Stack health + Playwright E2E
  # ──────────────────────────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: '11.11.0'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Start Docker Compose stack
        run: docker compose up -d postgres redis minio backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3001/api/healthz; then echo "Backend ready"; exit 0; fi
            echo "Waiting ($i/40)..."; sleep 5
          done; echo "Backend unhealthy"; exit 1

      - name: Seed database
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm prisma generate
          pnpm db:big-seed
        env:
          DATABASE_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow
          DIRECT_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Start admin app
        run: cd web/apps/admin && npx next dev --port 3000 &

      - name: Start restaurant app
        run: cd web/apps/restaurant && npx next dev --port 3002 &

      - name: Wait for web apps
        run: npx wait-on http://localhost:3000 http://localhost:3002 --timeout 90000

      - name: Install Playwright browsers
        run: cd web && pnpm test:e2e:install

      - name: Run Playwright E2E
        run: cd web && pnpm test:e2e --project=chromium
        env:
          CI: 'true'
          ADMIN_URL: http://localhost:3000
          RESTAURANT_URL: http://localhost:3002
          API_URL: http://localhost:3001/api

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: web/e2e/playwright-report/
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose down

  # ──────────────────────────────────────────────────────────────────────────
  # Gate 3: k6 load test (100 RPS × 5 min)
  # ──────────────────────────────────────────────────────────────────────────
  k6-load:
    name: k6 Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !inputs.skip_k6 }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: '11.11.0'

      - name: Start Docker Compose stack
        run: docker compose up -d postgres redis minio backend
        env:
          THROTTLER_LIMIT: '50000'

      - name: Wait for backend health
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3001/api/healthz; then echo "Ready"; exit 0; fi
            echo "Waiting for backend ($i/40)..."
            sleep 5
          done; exit 1

      - name: Seed database
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm prisma generate
          pnpm db:big-seed
        env:
          DATABASE_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow
          DIRECT_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo 'deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main' \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 load test
        run: |
          k6 run \
            --env API_URL=http://localhost:3001/api \
            --out json=k6-results.json \
            infra/loadtest/k6-mixed.js

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: k6-results-${{ github.run_id }}
          path: k6-results.json
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose down

  # ──────────────────────────────────────────────────────────────────────────
  # Gate 4: Lighthouse CI (mobile + desktop)
  # ──────────────────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !inputs.skip_lighthouse }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: '11.11.0'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Start Docker Compose stack
        run: docker compose up -d postgres redis minio backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3001/api/healthz; then exit 0; fi
            echo "Waiting for backend ($i/40)..."
            sleep 5
          done; exit 1

      - name: Seed database
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm prisma generate
          pnpm db:big-seed
        env:
          DATABASE_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow
          DIRECT_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow

      - name: Install web + LHCI
        run: cd web && pnpm install --frozen-lockfile

      - name: Build web apps
        run: cd web && pnpm build
        env:
          NEXT_PUBLIC_APP_ENV: development
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_WS_URL: http://localhost:3001/events
          NEXT_PUBLIC_REALTIME_PROVIDER: socketio
          NEXT_PUBLIC_ADMIN_URL: http://localhost:3000
          NEXT_PUBLIC_RESTAURANT_URL: http://localhost:3002

      - name: Start built apps
        run: |
          (cd web/apps/admin && npx next start --port 3000) &
          (cd web/apps/restaurant && npx next start --port 3002) &
          npx wait-on http://localhost:3000 http://localhost:3002 --timeout 60000
        env:
          NEXT_PUBLIC_APP_ENV: development
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_WS_URL: http://localhost:3001/events
          NEXT_PUBLIC_REALTIME_PROVIDER: socketio
          NEXT_PUBLIC_ADMIN_URL: http://localhost:3000
          NEXT_PUBLIC_RESTAURANT_URL: http://localhost:3002

      - name: Lighthouse — mobile
        run: cd web && pnpm exec lhci autorun --config=../infra/lighthouse/lighthouserc.cjs --upload.target=filesystem --upload.outputDir=.lighthouseci/mobile
        env:
          ADMIN_URL: http://localhost:3000
          RESTAURANT_URL: http://localhost:3002

      - name: Lighthouse — desktop
        run: cd web && pnpm exec lhci autorun --config=../infra/lighthouse/lighthouserc.cjs --upload.target=filesystem --upload.outputDir=.lighthouseci/desktop
        env:
          ADMIN_URL: http://localhost:3000
          RESTAURANT_URL: http://localhost:3002
          LHCI_FORM_FACTOR: desktop

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: lhci-report-${{ github.run_id }}
          path: web/.lighthouseci/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose down

  # ──────────────────────────────────────────────────────────────────────────
  # Gate 5: AI scenarios
  # ──────────────────────────────────────────────────────────────────────────
  ai-scenarios:
    name: AI Contract / Live Scenario Assertions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: '11.11.0'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Start Docker Compose stack
        run: docker compose up -d postgres redis minio backend
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Wait for backend health
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3001/api/healthz; then exit 0; fi
            echo "Waiting for backend ($i/40)..."
            sleep 5
          done; exit 1

      - name: Seed database
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm prisma generate
          pnpm db:big-seed
        env:
          DATABASE_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow
          DIRECT_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow

      - name: Install tsx
        run: npm install -g tsx

      - name: Verify AI contract or live scenarios
        run: |
          set -o pipefail
          mkdir -p e2e/reports
          npx --yes tsx e2e/ai-scenarios/run-ai-scenarios.ts \
            --fixtures e2e/ai-scenarios/canonical-conversations.json \
            --validate-only true | tee e2e/reports/ai-scenarios.log
          AI_LOGIN_JSON="$(curl -fsS -X POST http://localhost:3001/api/auth/login \
            -H 'Content-Type: application/json' \
            --data '{"email":"customer1@foodflow.vn","password":"Customer@123"}')"
          AI_ACCESS_TOKEN="$(
            AI_LOGIN_JSON="$AI_LOGIN_JSON" node -e 'const payload = JSON.parse(process.env.AI_LOGIN_JSON); const token = payload.accessToken || payload.data?.accessToken; if (!token) { console.error("missing access token"); process.exit(1); } process.stdout.write(token);'
          )"
          export AI_ACCESS_TOKEN
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            npx --yes tsx e2e/ai-scenarios/run-ai-scenarios.ts \
              --endpoint http://localhost:3001/api/ai/chat \
              --fixtures e2e/ai-scenarios/canonical-conversations.json \
              | tee -a e2e/reports/ai-scenarios.log
          else
            AI_RESPONSE_FILE="$RUNNER_TEMP/ai-provider-not-configured.json"
            AI_STATUS="$(curl -sS -o "$AI_RESPONSE_FILE" -w '%{http_code}' \
              -X POST http://localhost:3001/api/ai/chat \
              -H 'Content-Type: application/json' \
              -H "Authorization: Bearer $AI_ACCESS_TOKEN" \
              --data '{"message":"Where is my current order?"}')"
            AI_STATUS="$AI_STATUS" AI_RESPONSE_FILE="$AI_RESPONSE_FILE" node -e '
              const fs = require("node:fs");
              const status = Number(process.env.AI_STATUS);
              const body = JSON.parse(fs.readFileSync(process.env.AI_RESPONSE_FILE, "utf8"));
              if (status !== 503 || body.code !== "AI_PROVIDER_NOT_CONFIGURED") {
                console.error(`expected fail-closed 503 AI_PROVIDER_NOT_CONFIGURED, received ${status} ${body.code ?? "NO_CODE"}`);
                process.exit(1);
              }
              console.log("AI provider absent: fail-closed contract verified");
            ' | tee -a e2e/reports/ai-scenarios.log
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ai-scenarios-log-${{ github.run_id }}
          path: e2e/reports/ai-scenarios.log
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose down

  # ──────────────────────────────────────────────────────────────────────────
  # Summary gate — all must pass
  # ──────────────────────────────────────────────────────────────────────────
  integration-gate:
    name: Integration Gate
    runs-on: ubuntu-latest
    needs: [playwright, k6-load, lighthouse, ai-scenarios]
    if: always()

    steps:
      - name: Check all gates
        run: |
          FAILED=""
          [ "${{ needs.playwright.result }}" != "success" ] && FAILED="$FAILED playwright"
          [ "${{ needs.k6-load.result }}" != "success" ] && [ "${{ needs.k6-load.result }}" != "skipped" ] && FAILED="$FAILED k6-load"
          [ "${{ needs.lighthouse.result }}" != "success" ] && [ "${{ needs.lighthouse.result }}" != "skipped" ] && FAILED="$FAILED lighthouse"
          [ "${{ needs.ai-scenarios.result }}" != "success" ] && FAILED="$FAILED ai-scenarios"
          if [ -n "$FAILED" ]; then
            echo "FAILED gates:$FAILED"
            exit 1
          fi
          echo "All integration gates passed"
