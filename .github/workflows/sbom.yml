name: SBOM Generation

on:
  push:
    branches: [master, main, codex/batch4-integration]
    tags: ['v*']
  schedule:
    - cron: '0 0 1 * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME//\//-}"
          docker build -t foodflow-backend:$IMAGE_TAG ./backend
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Generate SBOM from Docker image
        uses: anchore/sbom-action@v0
        with:
          image: foodflow-backend:${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.IMAGE_TAG }}
          path: sbom.spdx.json
          retention-days: 90

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Attaching SBOM to release ${{ github.ref_name }}..."
          # Wait up to 3 minutes for the release workflow to create the release
          for i in $(seq 1 18); do
            if gh release view "${{ github.ref_name }}" --json tagName > /dev/null 2>&1; then
              echo "Release found."
              break
            fi
            echo "Release not ready yet, retrying... ($i/18)"
            sleep 10
          done
          gh release upload "${{ github.ref_name }}" sbom.spdx.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
