name: E2E Tests

on:
  push:
    branches: [master, main, codex/batch4-integration]
    paths:
      - 'web/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [master, main, codex/batch4-integration]
    paths:
      - 'web/**'
      - 'backend/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: '11.11.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install backend dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Build and start the isolated current-source stack
        run: |
          docker compose -p foodflow-e2e -f docker-compose.yml -f docker-compose.e2e.yml \
            up --build --detach --wait --wait-timeout 180

      - name: Verify the migrator and seed disposable E2E data
        run: |
          docker compose -p foodflow-e2e -f docker-compose.yml -f docker-compose.e2e.yml \
            run --rm migrate
          cd backend
          pnpm prisma generate
          pnpm db:big-seed
        env:
          DATABASE_URL: postgresql://foodflow:foodflow_dev@localhost:15432/foodflow
          DIRECT_URL: postgresql://foodflow:foodflow_dev@localhost:15432/foodflow

      - name: Require worker startup and post-seed RAG sync
        run: |
          docker compose -p foodflow-e2e -f docker-compose.yml -f docker-compose.e2e.yml restart worker
          for i in $(seq 1 40); do
            logs="$(docker compose -p foodflow-e2e -f docker-compose.yml -f docker-compose.e2e.yml logs worker)"
            if printf '%s' "$logs" | grep -q "FoodFlow Worker started" \
              && printf '%s' "$logs" | grep -q "RAG sync complete"; then
              echo "Worker and RAG sync ready"; exit 0
            fi
            echo "Waiting for worker RAG sync ($i/40)..."; sleep 3
          done
          docker compose -p foodflow-e2e -f docker-compose.yml -f docker-compose.e2e.yml logs worker
          echo "Worker did not produce a post-seed RAG sync"; exit 1

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd web && pnpm test:e2e:install

      - name: Run isolated Docker E2E matrix
        run: cd web && pnpm test:e2e
        env:
          CI: 'true'
          ADMIN_URL: http://localhost:13000
          RESTAURANT_URL: http://localhost:13002
          API_URL: http://localhost:13001/api

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: web/e2e/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: web/test-results/
          retention-days: 14

      - name: Stop isolated Docker stack
        if: always()
        run: docker compose -p foodflow-e2e -f docker-compose.yml -f docker-compose.e2e.yml down --volumes
