name: E2E Tests

on:
  push:
    branches: [master, main, codex/batch4-integration]
    paths:
      - 'web/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [master, main, codex/batch4-integration]
    paths:
      - 'web/**'
      - 'backend/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: '11.11.0'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            web/pnpm-lock.yaml

      # ── Backend stack ────────────────────────────────────────────────────
      - name: Start database and supporting services
        run: docker compose up -d postgres redis minio

      - name: Install backend dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Apply migrations and seed database
        run: |
          cd backend
          pnpm prisma generate
          pnpm prisma migrate deploy
          pnpm db:big-seed
        env:
          DATABASE_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow
          DIRECT_URL: postgresql://foodflow:foodflow_dev@localhost:5432/foodflow

      - name: Start backend
        run: docker compose up -d backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/healthz; then
              echo "Backend ready"; exit 0
            fi
            echo "Waiting for backend ($i/30)..."; sleep 5
          done
          docker compose logs backend
          echo "Backend did not start in time"; exit 1

      # ── Web apps ─────────────────────────────────────────────────────────
      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Start admin app (background)
        run: |
          cd web/apps/admin
          npx next dev --port 3000 &
          echo "ADMIN_PID=$!" >> "$GITHUB_ENV"

      - name: Start restaurant app (background)
        run: |
          cd web/apps/restaurant
          npx next dev --port 3002 &
          echo "RESTAURANT_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for web apps
        run: |
          npx wait-on http://localhost:3000 http://localhost:3002 --timeout 60000

      # ── Playwright ───────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: cd web && pnpm test:e2e:install

      - name: Run E2E tests on Chromium and Firefox
        run: cd web && pnpm test:e2e --project=chromium --project=firefox
        env:
          CI: 'true'
          ADMIN_URL: http://localhost:3000
          RESTAURANT_URL: http://localhost:3002
          API_URL: http://localhost:3001/api

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: web/e2e/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: web/e2e/test-results/
          retention-days: 14

      - name: Stop background apps
        if: always()
        run: |
          kill "$ADMIN_PID" "$RESTAURANT_PID" 2>/dev/null || true
          docker compose down
