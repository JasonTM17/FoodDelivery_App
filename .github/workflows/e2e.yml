name: E2E Tests

on:
  push:
    branches: [master, main, codex/batch4-integration]
    paths:
      - 'web/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [master, main, codex/batch4-integration]
    paths:
      - 'web/**'
      - 'backend/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: '11.11.0'

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install backend dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Build and start the isolated current-source stack
        run: |
          docker compose -p foodflow-batch4-e2e -f docker-compose.yml -f docker-compose.e2e.yml \
            up --build --detach --wait --wait-timeout 180 \
            postgres redis minio migrate backend admin restaurant

      - name: Verify the migrator and seed disposable E2E data
        run: |
          docker compose -p foodflow-batch4-e2e -f docker-compose.yml -f docker-compose.e2e.yml \
            run --rm migrate
          cd backend
          export DATABASE_URL=postgresql://foodflow:foodflow_dev@localhost:15432/foodflow
          export DIRECT_URL=postgresql://foodflow:foodflow_dev@localhost:15432/foodflow
          pnpm prisma generate
          pnpm db:big-seed

      - name: Require worker startup and post-seed RAG sync
        run: |
          worker_restart_started_at="$(date --iso-8601=seconds)"
          docker compose -p foodflow-batch4-e2e -f docker-compose.yml -f docker-compose.e2e.yml up --detach worker
          for i in $(seq 1 40); do
            logs="$(docker compose -p foodflow-batch4-e2e -f docker-compose.yml -f docker-compose.e2e.yml logs --since "$worker_restart_started_at" worker)"
            if printf '%s' "$logs" | grep -q "FoodFlow Worker started" \
              && printf '%s' "$logs" | grep -q "RAG sync complete"; then
              echo "Worker and RAG sync ready"; exit 0
            fi
            echo "Waiting for worker RAG sync ($i/40)..."; sleep 3
          done
          docker compose -p foodflow-batch4-e2e -f docker-compose.yml -f docker-compose.e2e.yml logs --since "$worker_restart_started_at" worker
          echo "Worker did not produce a post-seed RAG sync"; exit 1

      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd web && pnpm test:e2e:install

      - name: Run isolated Docker E2E matrix
        run: cd web && pnpm test:e2e
        env:
          CI: 'true'
          ADMIN_URL: http://localhost:13000
          RESTAURANT_URL: http://localhost:13002
          API_URL: http://localhost:13001/api

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}
          path: web/e2e/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces-${{ github.run_id }}
          path: web/test-results/
          retention-days: 14

      - name: Stop isolated Docker stack
        if: always()
        run: docker compose -p foodflow-batch4-e2e -f docker-compose.yml -f docker-compose.e2e.yml down --volumes
