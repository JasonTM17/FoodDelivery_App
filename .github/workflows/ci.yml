name: CI

on:
  push:
    branches: [master, main, codex/batch4-integration]
  pull_request:
    branches: [master, main, codex/batch4-integration]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env: { POSTGRES_USER: test, POSTGRES_PASSWORD: test, POSTGRES_DB: test }
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: '11.7.0' }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DIRECT_URL: postgresql://test:test@localhost:5432/test

      - name: Type check
        run: pnpm typecheck
        working-directory: backend

      - name: Run migrations
        run: pnpm prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DIRECT_URL: postgresql://test:test@localhost:5432/test

      - name: Run tests with coverage
        run: pnpm test --coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DIRECT_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxx

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: '11.7.0' }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Lint
        run: pnpm lint
        working-directory: web

      - name: Type check
        run: pnpm typecheck
        working-directory: web

      - name: Build
        run: pnpm build
        working-directory: web
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_API_URL: https://api.foodflow.test/api
          NEXT_PUBLIC_REALTIME_PROVIDER: supabase
          NEXT_PUBLIC_SUPABASE_URL: https://foodflow-ci.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-public-anon-key-for-contract-tests
          NEXT_PUBLIC_ADMIN_URL: https://admin.foodflow.test
          NEXT_PUBLIC_RESTAURANT_URL: https://restaurant.foodflow.test
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: ci-google-maps-browser-key
