name: Docker Publish

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: nguyenson1710

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: nguyenson1710/foodflow-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: runner
            platforms: linux/amd64
            build-args: |
              BUILD_SHA=${{ github.sha }}
          - image: nguyenson1710/foodflow-migrate
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: migrator
            platforms: linux/amd64
            build-args: |
              BUILD_SHA=${{ github.sha }}
          # NOTE: secrets.* cannot be referenced inside strategy.matrix (parse-time).
          # Browser-safe provider keys are injected at the build step below.
          - image: nguyenson1710/foodflow-admin
            context: ./web
            dockerfile: ./web/apps/admin/Dockerfile
            target: runner
            platforms: linux/amd64
            build-args: |
              BUILD_SHA=${{ github.sha }}
              NEXT_PUBLIC_APP_ENV=production
              NEXT_PUBLIC_API_URL=https://api.foodflow.vn/api
              NEXT_PUBLIC_REALTIME_PROVIDER=supabase
              NEXT_PUBLIC_SUPABASE_URL=https://lvanszgszzfopusboich.supabase.co
              NEXT_PUBLIC_ADMIN_URL=https://admin.foodflow.vn
          - image: nguyenson1710/foodflow-restaurant
            context: ./web
            dockerfile: ./web/apps/restaurant/Dockerfile
            target: runner
            platforms: linux/amd64
            build-args: |
              BUILD_SHA=${{ github.sha }}
              NEXT_PUBLIC_APP_ENV=production
              NEXT_PUBLIC_API_URL=https://api.foodflow.vn/api
              NEXT_PUBLIC_REALTIME_PROVIDER=supabase
              NEXT_PUBLIC_SUPABASE_URL=https://lvanszgszzfopusboich.supabase.co
              NEXT_PUBLIC_RESTAURANT_URL=https://restaurant.foodflow.vn

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Validate web image public build inputs
        if: contains(matrix.image, 'foodflow-admin') || contains(matrix.image, 'foodflow-restaurant')
        shell: bash
        env:
          GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          test -n "$GOOGLE_MAPS_KEY" || { echo 'Missing NEXT_PUBLIC_GOOGLE_MAPS_KEY'; exit 1; }
          test -n "$SUPABASE_ANON_KEY" || { echo 'Missing NEXT_PUBLIC_SUPABASE_ANON_KEY'; exit 1; }

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platforms }}
          # secrets only valid in steps — not in strategy.matrix
          build-args: |
            ${{ matrix.build-args }}
            NEXT_PUBLIC_GOOGLE_MAPS_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - nguyenson1710/foodflow-backend
          - nguyenson1710/foodflow-admin
          - nguyenson1710/foodflow-restaurant

    steps:
      - name: Trivy vulnerability scan (${{ matrix.image }})
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
