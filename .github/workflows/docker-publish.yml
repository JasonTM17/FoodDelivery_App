name: Docker Publish

on:
  push:
    branches: [master]
    tags: ['v*']

env:
  DOCKERHUB_USERNAME: nguyenson1710

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: nguyenson1710/foodflow-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build-args: |
              BUILD_SHA=${{ github.sha }}
          - image: nguyenson1710/foodflow-admin
            context: ./web
            dockerfile: ./web/apps/admin/Dockerfile
            build-args: |
              BUILD_SHA=${{ github.sha }}
              NEXT_PUBLIC_APP_ENV=production
              NEXT_PUBLIC_API_URL=https://api.foodflow.vn/api
              NEXT_PUBLIC_WS_URL=wss://api.foodflow.vn/events
              NEXT_PUBLIC_ADMIN_URL=https://admin.foodflow.vn
              NEXT_PUBLIC_GOOGLE_MAPS_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          - image: nguyenson1710/foodflow-restaurant
            context: ./web
            dockerfile: ./web/apps/restaurant/Dockerfile
            build-args: |
              BUILD_SHA=${{ github.sha }}
              NEXT_PUBLIC_APP_ENV=production
              NEXT_PUBLIC_API_URL=https://api.foodflow.vn/api
              NEXT_PUBLIC_WS_URL=wss://api.foodflow.vn/events
              NEXT_PUBLIC_RESTAURANT_URL=https://restaurant.foodflow.vn
              NEXT_PUBLIC_GOOGLE_MAPS_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: ${{ matrix.build-args }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - nguyenson1710/foodflow-backend
          - nguyenson1710/foodflow-admin
          - nguyenson1710/foodflow-restaurant

    steps:
      - name: Trivy vulnerability scan (${{ matrix.image }})
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
