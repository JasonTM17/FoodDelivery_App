name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Immutable semver tag; use only after this SHA is deployed to production
        required: false
        default: ""
        type: string
      source_sha:
        description: Full immutable deployed commit SHA; leave blank to use the current master head
        required: false
        default: ""
        type: string
      publish_release:
        description: Verify exact deployed revisions, then promote SHA manifests to release_tag
        required: true
        default: false
        type: boolean
      promote_latest:
        description: Promote the verified release manifests to latest
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.sha }}
  cancel-in-progress: false

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release.outputs.tag }}
      source_sha: ${{ steps.release.outputs.source_sha }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Validate release source and tag
        id: release
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          INPUT_PROMOTE_LATEST: ${{ inputs.promote_latest }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin master

          test "$GITHUB_SHA" = "$(git rev-parse origin/master)" || {
            echo 'Docker publishes must run from the current origin/master head.'
            exit 1
          }

          source_sha="$GITHUB_SHA"
          if [[ -n "$INPUT_SOURCE_SHA" ]]; then
            [[ "$INPUT_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
              echo 'source_sha must be a full lowercase 40-character commit SHA.'
              exit 1
            }
            git cat-file -e "$INPUT_SOURCE_SHA^{commit}" || {
              echo 'source_sha does not identify a repository commit.'
              exit 1
            }
            source_sha="$(git rev-parse "$INPUT_SOURCE_SHA^{commit}")"
            git merge-base --is-ancestor "$source_sha" origin/master || {
              echo 'source_sha must be an ancestor of the current master head.'
              exit 1
            }
            [[ "$INPUT_PUBLISH_RELEASE" == "true" ]] || {
              echo 'An explicit source_sha is allowed only for release promotion.'
              exit 1
            }
          fi

          release_tag=""
          if [[ "$INPUT_PUBLISH_RELEASE" == "true" ]]; then
            release_tag="$INPUT_RELEASE_TAG"
            [[ -n "$release_tag" ]] || {
              echo 'publish_release requires release_tag.'
              exit 1
            }
          elif [[ "$INPUT_PROMOTE_LATEST" == "true" ]]; then
            echo 'promote_latest requires publish_release.'
            exit 1
          fi

          if [[ -n "$release_tag" ]]; then
            [[ "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
              echo 'release_tag must use stable semver format vMAJOR.MINOR.PATCH.'
              exit 1
            }
            git fetch --force origin "refs/tags/$release_tag:refs/tags/$release_tag"
            test "$(git rev-parse "$release_tag^{commit}")" = "$source_sha" || {
              echo 'release_tag must point to source_sha.'
              exit 1
            }
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Validate registry secrets and public build URLs
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ADMIN_URL: ${{ vars.NEXT_PUBLIC_ADMIN_URL }}
          NEXT_PUBLIC_RESTAURANT_URL: ${{ vars.NEXT_PUBLIC_RESTAURANT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MAP_PROVIDER: ${{ vars.NEXT_PUBLIC_MAP_PROVIDER }}
          NEXT_PUBLIC_MAP_STYLE_URL: ${{ vars.NEXT_PUBLIC_MAP_STYLE_URL }}
        run: |
          set -euo pipefail
          required=(
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            NEXT_PUBLIC_API_URL
            NEXT_PUBLIC_ADMIN_URL
            NEXT_PUBLIC_RESTAURANT_URL
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
            NEXT_PUBLIC_MAP_PROVIDER
            NEXT_PUBLIC_MAP_STYLE_URL
          )
          for name in "${required[@]}"; do
            test -n "${!name:-}" || {
              echo "Missing required release input: $name"
              exit 1
            }
          done

          node --input-type=module <<'NODE'
          const values = [
            ['NEXT_PUBLIC_API_URL', process.env.NEXT_PUBLIC_API_URL, 'railway-api'],
            ['NEXT_PUBLIC_ADMIN_URL', process.env.NEXT_PUBLIC_ADMIN_URL, 'vercel-origin'],
            ['NEXT_PUBLIC_RESTAURANT_URL', process.env.NEXT_PUBLIC_RESTAURANT_URL, 'vercel-origin'],
            ['NEXT_PUBLIC_SUPABASE_URL', process.env.NEXT_PUBLIC_SUPABASE_URL, 'supabase-origin'],
            ['NEXT_PUBLIC_MAP_STYLE_URL', process.env.NEXT_PUBLIC_MAP_STYLE_URL, 'openfreemap-style'],
          ];

          for (const [name, raw, kind] of values) {
            let url;
            try {
              url = new URL(raw);
            } catch {
              throw new Error(`${name} must be an absolute URL`);
            }
            if (url.protocol !== 'https:' || url.username || url.password || url.search || url.hash) {
              throw new Error(`${name} must be a credential-free HTTPS URL without query or fragment`);
            }
            const path = url.pathname.replace(/\/+$/, '');
            if (kind === 'vercel-origin' && !url.hostname.endsWith('.vercel.app')) {
              throw new Error(`${name} must use a verified Vercel alias`);
            }
            if (kind === 'railway-api' && (url.hostname.endsWith('.vercel.app') || path !== '/api')) {
              throw new Error('NEXT_PUBLIC_API_URL must end in /api');
            }
            if (kind === 'vercel-origin' && path !== '') {
              throw new Error(`${name} must be an origin URL without a path`);
            }
            if (kind === 'supabase-origin' && (!url.hostname.endsWith('.supabase.co') || path !== '')) {
              throw new Error('NEXT_PUBLIC_SUPABASE_URL must be a Supabase project origin');
            }
            if (kind === 'openfreemap-style' && (
              url.hostname !== 'tiles.openfreemap.org' || !path.startsWith('/styles/')
            )) {
              throw new Error('NEXT_PUBLIC_MAP_STYLE_URL must use an OpenFreeMap style URL');
            }
          }

          if (process.env.NEXT_PUBLIC_MAP_PROVIDER !== 'openfreemap') {
            throw new Error('NEXT_PUBLIC_MAP_PROVIDER must be openfreemap');
          }

          if (!/^[a-z0-9][a-z0-9_-]+$/.test(process.env.DOCKERHUB_USERNAME)) {
            throw new Error('DOCKERHUB_USERNAME has an invalid format');
          }
          NODE

  build-and-push:
    needs: release-preflight
    runs-on: ubuntu-latest
    strategy:
      # A permission or registry error for one surface must not hide the
      # publication result of the other independently deployable images.
      fail-fast: false
      matrix:
        include:
          - name: foodflow-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: runner
            web: false
          - name: foodflow-migrate
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: migrator
            web: false
          - name: foodflow-admin
            context: ./web
            dockerfile: ./web/apps/admin/Dockerfile
            target: runner
            web: true
          - name: foodflow-restaurant
            context: ./web
            dockerfile: ./web/apps/restaurant/Dockerfile
            target: runner
            web: true

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ needs.release-preflight.outputs.source_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Protect immutable SHA tag
        id: immutable
        shell: bash
        env:
          DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          IMAGE_TAG: sha-${{ needs.release-preflight.outputs.source_sha }}
          REQUIRE_EXISTING: ${{ inputs.source_sha != '' }}
        run: |
          set -euo pipefail
          GHCR_IMAGE="${GHCR_IMAGE,,}"
          read_digest() {
            local image="$1"
            local label="$2"
            local inspect_output=""
            if ! inspect_output="$(docker buildx imagetools inspect "$image:$IMAGE_TAG" 2>/dev/null)"; then
              return 1
            fi
            if ! grep -Fq 'Platform:    linux/amd64' <<< "$inspect_output" ||
              ! grep -Fq 'Platform:    linux/arm64' <<< "$inspect_output"; then
              echo "$label $IMAGE_TAG is not a complete amd64/arm64 manifest." >&2
              return 2
            fi
            local digest=""
            digest="$(awk '/^Digest:/ {print $2; exit}' <<< "$inspect_output")"
            if [[ -z "$digest" ]]; then
              echo "$label $IMAGE_TAG has no digest." >&2
              return 2
            fi
            printf '%s' "$digest"
          }

          set +e
          dockerhub_digest="$(read_digest "$DOCKERHUB_IMAGE" 'Docker Hub')"
          dockerhub_status=$?
          ghcr_digest="$(read_digest "$GHCR_IMAGE" 'GHCR')"
          ghcr_status=$?
          set -e

          if [[ "$dockerhub_status" -gt 1 || "$ghcr_status" -gt 1 ]]; then
            echo "Refusing to overwrite malformed immutable tag $IMAGE_TAG."
            exit 1
          fi

          if [[ -z "$dockerhub_digest" && -z "$ghcr_digest" ]]; then
            if [[ "$REQUIRE_EXISTING" == "true" ]]; then
              echo "Explicit source_sha requires existing immutable manifests for $IMAGE_TAG."
              exit 1
            fi
            echo 'exists=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$dockerhub_digest" || -z "$ghcr_digest" ]]; then
            echo "Refusing to overwrite $IMAGE_TAG because it exists in only one registry."
            exit 1
          fi

          if [[ "$dockerhub_digest" != "$ghcr_digest" ]]; then
            echo "Refusing to overwrite $IMAGE_TAG because registry digests differ."
            echo "Docker Hub: $dockerhub_digest"
            echo "GHCR: $ghcr_digest"
            exit 1
          fi

          echo 'exists=true' >> "$GITHUB_OUTPUT"
          echo "digest=$dockerhub_digest" >> "$GITHUB_OUTPUT"
          echo "Reusing verified immutable manifest $dockerhub_digest"

      - name: Extract immutable image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=sha-${{ needs.release-preflight.outputs.source_sha }}

      - name: Build and push backend image
        if: ${{ !matrix.web && steps.immutable.outputs.exists != 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_SHA=${{ needs.release-preflight.outputs.source_sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}:buildcache,mode=max

      - name: Build and push web image
        if: ${{ matrix.web && steps.immutable.outputs.exists != 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_SHA=${{ needs.release-preflight.outputs.source_sha }}
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_REALTIME_PROVIDER=supabase
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_ADMIN_URL=${{ vars.NEXT_PUBLIC_ADMIN_URL }}
            NEXT_PUBLIC_RESTAURANT_URL=${{ vars.NEXT_PUBLIC_RESTAURANT_URL }}
            NEXT_PUBLIC_MAP_PROVIDER=${{ vars.NEXT_PUBLIC_MAP_PROVIDER }}
            NEXT_PUBLIC_MAP_STYLE_URL=${{ vars.NEXT_PUBLIC_MAP_STYLE_URL }}
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}:buildcache,mode=max

      - name: Inspect published multi-architecture manifest
        shell: bash
        env:
          DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          IMAGE_TAG: sha-${{ needs.release-preflight.outputs.source_sha }}
        run: |
          set -euo pipefail
          GHCR_IMAGE="${GHCR_IMAGE,,}"
          inspect_digest() {
            local image="$1"
            local label="$2"
            local digest=""
            local inspect_output=""
            local max_attempts=60
            local retry_delay_seconds=5
            for attempt in $(seq 1 "$max_attempts"); do
              if inspect_output="$(docker buildx imagetools inspect "$image:$IMAGE_TAG" 2>/dev/null)" &&
                grep -Fq 'Platform:    linux/amd64' <<< "$inspect_output" &&
                grep -Fq 'Platform:    linux/arm64' <<< "$inspect_output"; then
                digest="$(awk '/^Digest:/ {print $2; exit}' <<< "$inspect_output")"
                if [[ -n "$digest" ]]; then
                  printf '%s' "$digest"
                  return 0
                fi
              fi
              echo "$label manifest is not visible yet (attempt $attempt/$max_attempts)." >&2
              if [[ "$attempt" -lt "$max_attempts" ]]; then
                sleep "$retry_delay_seconds"
              fi
            done
            echo "$label manifest has no digest." >&2
            return 1
          }

          dockerhub_digest="$(inspect_digest "$DOCKERHUB_IMAGE" 'Docker Hub')"
          ghcr_digest="$(inspect_digest "$GHCR_IMAGE" 'GHCR')"
          test "$dockerhub_digest" = "$ghcr_digest" || {
            echo "Registry digest mismatch for ${{ matrix.name }}"
            echo "Docker Hub: $dockerhub_digest"
            echo "GHCR: $ghcr_digest"
            exit 1
          }
          echo "Docker Hub and GHCR published $dockerhub_digest"

  runtime-smoke:
    needs: [release-preflight, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: foodflow-backend
            kind: backend
          - image: foodflow-migrate
            kind: migrate
          - image: foodflow-admin
            kind: web
            port: 3000
          - image: foodflow-restaurant
            kind: web
            port: 3002

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Smoke native runtime dependencies on AMD64 and ARM64
        shell: bash
        env:
          IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}:sha-${{ needs.release-preflight.outputs.source_sha }}
          KIND: ${{ matrix.kind }}
          WEB_PORT: ${{ matrix.port }}
        run: |
          set -euo pipefail
          current_container=""
          cleanup_container() {
            if [[ -n "${current_container:-}" ]]; then
              docker rm -f "$current_container" >/dev/null 2>&1 || true
              current_container=""
            fi
          }
          trap cleanup_container EXIT

          for platform in linux/amd64 linux/arm64; do
            case "$KIND" in
              backend)
                docker run --rm --pull always --platform "$platform" \
                  --entrypoint /nodejs/bin/node "$IMAGE" -e '
                    const { createRequire } = require("module");
                    const bcrypt = require("bcrypt");
                    const hash = bcrypt.hashSync("foodflow-container-smoke", 4);
                    if (!bcrypt.compareSync("foodflow-container-smoke", hash)) {
                      throw new Error("bcrypt native round-trip failed");
                    }
                    const bullmq = require("bullmq");
                    const fromBull = createRequire(require.resolve("bullmq"));
                    const msgpackrMain = fromBull.resolve("msgpackr");
                    const msgpackr = fromBull("msgpackr");
                    const extract = createRequire(msgpackrMain)("msgpackr-extract");
                    const input = { orderId: "container-smoke", ok: true };
                    const output = msgpackr.unpack(msgpackr.pack(input));
                    if (!extract || typeof bullmq.Queue !== "function" || JSON.stringify(output) !== JSON.stringify(input)) {
                      throw new Error("BullMQ or MessagePack native runtime smoke failed");
                    }
                    if (process.getuid?.() === 0) throw new Error("backend container runs as root");
                    console.log(JSON.stringify({ arch: process.arch, uid: process.getuid?.(), native: true }));
                  '
                ;;
              migrate)
                docker run --rm --pull always --platform "$platform" \
                  --entrypoint /nodejs/bin/node "$IMAGE" -e '
                    if (process.getuid?.() === 0) throw new Error("migrate container runs as root");
                    console.log(JSON.stringify({ arch: process.arch, uid: process.getuid?.(), nonRoot: true }));
                  '
                docker run --rm --pull always --platform "$platform" "$IMAGE" \
                  node_modules/prisma/build/index.js --version
                ;;
              web)
                docker run --rm --pull always --platform "$platform" \
                  --entrypoint /nodejs/bin/node "$IMAGE" -e '
                    const fs = require("fs");
                    const base = "/app/node_modules/.pnpm";
                    const packageDir = fs.readdirSync(base).find((entry) => entry.startsWith("sharp@"));
                    if (!packageDir) throw new Error("sharp package is missing from the standalone image");
                    const sharp = require(`${base}/${packageDir}/node_modules/sharp`);
                    if (process.getuid?.() === 0) throw new Error("web container runs as root");
                    sharp({
                      create: { width: 2, height: 2, channels: 4, background: { r: 14, g: 165, b: 164, alpha: 1 } },
                    }).png().toBuffer().then((buffer) => {
                      if (buffer.length === 0) throw new Error("sharp produced an empty image");
                      console.log(JSON.stringify({ arch: process.arch, uid: process.getuid?.(), sharp: true }));
                    }).catch((error) => {
                      console.error(error);
                      process.exit(1);
                    });
                  '

                image_name="${IMAGE##*/}"
                platform_slug="${platform//\//-}"
                current_container="${image_name%%:*}-${platform_slug}-smoke"
                docker run -d --platform "$platform" --name "$current_container" \
                  -p "127.0.0.1::${WEB_PORT}" "$IMAGE" >/dev/null
                host_port="$(docker port "$current_container" "${WEB_PORT}/tcp" | awk -F: 'NR == 1 { print $NF }')"
                test -n "$host_port"

                ready=false
                for _ in $(seq 1 60); do
                  health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$current_container")"
                  if [[ "$health" == "unhealthy" ]]; then
                    docker logs "$current_container"
                    exit 1
                  fi
                  if [[ "$health" == "healthy" ]] && curl --fail --silent --show-error \
                    "http://127.0.0.1:${host_port}/api/healthz" >/dev/null; then
                    ready=true
                    break
                  fi
                  sleep 1
                done
                if [[ "$ready" != "true" ]]; then
                  docker logs "$current_container"
                  exit 1
                fi

                if ! login_html="$(curl --fail --silent --show-error "http://127.0.0.1:${host_port}/en/login")"; then
                  docker logs "$current_container"
                  exit 1
                fi
                if ! grep -Fq '<html lang="en"' <<<"$login_html"; then
                  docker logs "$current_container"
                  echo "English login route did not render the expected html lang attribute"
                  exit 1
                fi
                cleanup_container
                ;;
              *)
                echo "Unsupported smoke kind: $KIND"
                exit 1
                ;;
            esac
          done

  scan:
    needs: [release-preflight, build-and-push, runtime-smoke]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        image:
          - foodflow-backend
          - foodflow-migrate
          - foodflow-admin
          - foodflow-restaurant
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Block Critical and High image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.image }}:sha-${{ needs.release-preflight.outputs.source_sha }}
          scanners: vuln
          vuln-type: os,library
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}

  production-smoke:
    needs: [release-preflight, runtime-smoke, scan]
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify exact deployed revision and production health
        env:
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          ADMIN_URL: ${{ vars.NEXT_PUBLIC_ADMIN_URL }}
          RESTAURANT_URL: ${{ vars.NEXT_PUBLIC_RESTAURANT_URL }}
          EXPECTED_SHA: ${{ needs.release-preflight.outputs.source_sha }}
        run: |
          node <<'NODE'
          const expected = process.env.EXPECTED_SHA
          const endpoints = [
            ['API health', `${process.env.API_URL.replace(/\/$/, '')}/healthz`, 'ok'],
            ['API readiness', `${process.env.API_URL.replace(/\/$/, '')}/readyz`, 'ready'],
            ['Admin health', `${process.env.ADMIN_URL.replace(/\/$/, '')}/api/healthz`, 'ok'],
            ['Restaurant health', `${process.env.RESTAURANT_URL.replace(/\/$/, '')}/api/healthz`, 'ok'],
          ]
          for (const [name, url, expectedStatus] of endpoints) {
            let response
            for (let attempt = 1; attempt <= 5; attempt += 1) {
              try {
                response = await fetch(url, { redirect: 'follow', signal: AbortSignal.timeout(20_000) })
                if (response.ok) break
              } catch (error) {
                if (attempt === 5) throw error
              }
              await new Promise(resolve => setTimeout(resolve, 3_000))
            }
            if (!response?.ok) throw new Error(`${name} returned HTTP ${response?.status}`)
            const body = await response.json()
            if (body.status !== expectedStatus) throw new Error(`${name} returned status ${body.status}`)
            if (body.revision !== expected) {
              throw new Error(`${name} revision ${body.revision ?? '<missing>'} does not match ${expected}`)
            }
            console.log(`${name} verified at ${expected}`)
          }
          NODE

  promote-release:
    needs: [release-preflight, production-smoke]
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote verified SHA manifests to the immutable release tag
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          GHCR_OWNER: ${{ github.repository_owner }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.release-tag }}
          SHA_TAG: sha-${{ needs.release-preflight.outputs.source_sha }}
        run: |
          set -euo pipefail
          images=(foodflow-backend foodflow-migrate foodflow-admin foodflow-restaurant)

          inspect_registry_manifest() {
            local ref="$1"
            local output=""
            local attempt
            for attempt in 1 2 3 4 5; do
              if output="$(docker buildx imagetools inspect "$ref" 2>&1)"; then
                printf '%s\n' "$output"
                return 0
              fi
              if grep -Eqi 'unauthorized|denied|not found|manifest unknown|no such manifest' <<< "$output"; then
                printf '%s\n' "$output" >&2
                return 1
              fi
              echo "Registry inspect transient failure for $ref (attempt $attempt/5)." >&2
              if [[ "$attempt" -lt 5 ]]; then
                sleep 5
              fi
            done
            printf '%s\n' "$output" >&2
            return 2
          }

          create_registry_manifest() {
            local target="$1"
            local source="$2"
            local output=""
            local attempt
            for attempt in 1 2 3 4 5; do
              if output="$(docker buildx imagetools create --tag "$target" "$source" 2>&1)"; then
                return 0
              fi
              if grep -Eqi 'unauthorized|denied' <<< "$output"; then
                printf '%s\n' "$output" >&2
                return 1
              fi
              echo "Registry create transient failure for $target (attempt $attempt/5)." >&2
              if [[ "$attempt" -lt 5 ]]; then
                sleep 5
              fi
            done
            printf '%s\n' "$output" >&2
            return 2
          }

          promote_release_manifest() {
            local source="$1"
            local target="$2"
            local source_digest target_digest target_inspect promoted_digest target_status create_status

            source_digest="$(inspect_registry_manifest "$source" | awk '/^Digest:/ {print $2; exit}')"
            test -n "$source_digest" || {
              echo "Published SHA manifest has no digest for $source"
              return 1
            }

            target_status=0
            if target_inspect="$(inspect_registry_manifest "$target")"; then
              target_digest="$(awk '/^Digest:/ {print $2; exit}' <<< "$target_inspect")"
              test "$source_digest" = "$target_digest" || {
                echo "Refusing to overwrite immutable tag $target"
                echo "Existing: $target_digest"
                echo "Requested: $source_digest"
                return 1
              }
              echo "$target already released at $target_digest"
              return 0
            else
              target_status=$?
              if [[ "$target_status" -ne 1 ]]; then
                return "$target_status"
              fi
            fi

            create_status=0
            create_registry_manifest "$target" "$source" || create_status=$?
            if [[ "$create_status" -ne 0 ]]; then
              return "$create_status"
            fi
            promoted_digest="$(inspect_registry_manifest "$target" | awk '/^Digest:/ {print $2; exit}')"
            test "$source_digest" = "$promoted_digest" || {
              echo "Release digest verification failed for $target"
              return 1
            }
            echo "$target released at $promoted_digest"
          }

          dockerhub_registry="docker.io/$DOCKERHUB_USERNAME"
          for image in "${images[@]}"; do
            promote_release_manifest \
              "$dockerhub_registry/$image:$SHA_TAG" \
              "$dockerhub_registry/$image:$RELEASE_TAG"
          done

          ghcr_registry="ghcr.io/${GHCR_OWNER,,}"
          for image in "${images[@]}"; do
            error_log="$(mktemp)"
            if promote_release_manifest \
              "$ghcr_registry/$image:$SHA_TAG" \
              "$ghcr_registry/$image:$RELEASE_TAG" 2> >(tee "$error_log" >&2); then
              rm -f "$error_log"
              continue
            fi

            if grep -Eqi '401 Unauthorized|unauthorized|denied' "$error_log"; then
              rm -f "$error_log"
              echo "::warning::GHCR denied semver manifest writes; Docker Hub release remains authoritative."
              echo "GHCR semver promotion unavailable; immutable SHA packages remain public." >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            rm -f "$error_log"
            exit 1
          done

  promote-latest:
    needs: [release-preflight, promote-release]
    if: ${{ inputs.promote_latest && inputs.publish_release }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote verified manifests and compare digests
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          GHCR_OWNER: ${{ github.repository_owner }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.release-tag }}
        run: |
          set -euo pipefail
          images=(foodflow-backend foodflow-migrate foodflow-admin foodflow-restaurant)

          inspect_registry_manifest() {
            local ref="$1"
            local output=""
            local attempt
            for attempt in 1 2 3 4 5; do
              if output="$(docker buildx imagetools inspect "$ref" 2>&1)"; then
                printf '%s\n' "$output"
                return 0
              fi
              if grep -Eqi 'unauthorized|denied|not found|manifest unknown|no such manifest' <<< "$output"; then
                printf '%s\n' "$output" >&2
                return 1
              fi
              echo "Registry inspect transient failure for $ref (attempt $attempt/5)." >&2
              if [[ "$attempt" -lt 5 ]]; then
                sleep 5
              fi
            done
            printf '%s\n' "$output" >&2
            return 2
          }

          create_registry_manifest() {
            local target="$1"
            local source="$2"
            local output=""
            local attempt
            for attempt in 1 2 3 4 5; do
              if output="$(docker buildx imagetools create --tag "$target" "$source" 2>&1)"; then
                return 0
              fi
              if grep -Eqi 'unauthorized|denied' <<< "$output"; then
                printf '%s\n' "$output" >&2
                return 1
              fi
              echo "Registry create transient failure for $target (attempt $attempt/5)." >&2
              if [[ "$attempt" -lt 5 ]]; then
                sleep 5
              fi
            done
            printf '%s\n' "$output" >&2
            return 2
          }

          promote_latest_manifest() {
            local source="$1"
            local target="$2"
            local source_digest target_digest

            create_registry_manifest "$target" "$source"
            source_digest="$(inspect_registry_manifest "$source" | awk '/^Digest:/ {print $2; exit}')"
            target_digest="$(inspect_registry_manifest "$target" | awk '/^Digest:/ {print $2; exit}')"
            if [[ -z "$source_digest" || "$source_digest" != "$target_digest" ]]; then
              echo "Digest verification failed for $target"
              return 1
            fi
            echo "$target promoted at $source_digest"
          }

          dockerhub_registry="docker.io/$DOCKERHUB_USERNAME"
          for image in "${images[@]}"; do
            promote_latest_manifest \
              "$dockerhub_registry/$image:$RELEASE_TAG" \
              "$dockerhub_registry/$image:latest"
          done

          ghcr_registry="ghcr.io/${GHCR_OWNER,,}"
          for image in "${images[@]}"; do
            source="$ghcr_registry/$image:$RELEASE_TAG"
            target="$ghcr_registry/$image:latest"
            if ! docker buildx imagetools inspect "$source" >/dev/null 2>&1; then
              echo "::warning::GHCR release tag is unavailable; skipping GHCR latest promotion."
              echo "GHCR latest promotion skipped; immutable SHA packages remain public." >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            error_log="$(mktemp)"
            if promote_latest_manifest "$source" "$target" 2> >(tee "$error_log" >&2); then
              rm -f "$error_log"
              continue
            fi

            if grep -Eqi '401 Unauthorized|unauthorized|denied' "$error_log"; then
              rm -f "$error_log"
              echo "::warning::GHCR denied latest manifest writes; Docker Hub latest remains authoritative."
              echo "GHCR latest promotion unavailable; immutable SHA packages remain public." >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            rm -f "$error_log"
            exit 1
          done
