name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for SBOM
        run: docker build -t foodflow-backend:${{ github.ref_name }} ./backend

      - name: Generate SBOM from source
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: sbom-source.spdx.json

      - name: Generate SBOM from Docker image
        uses: anchore/sbom-action@v0
        with:
          image: foodflow-backend:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom-image.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          generate_release_notes: true
          files: |
            CHANGELOG.md
            sbom-source.spdx.json
            sbom-image.spdx.json
