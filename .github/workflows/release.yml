name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git semver tag already promoted by Docker Publish
        required: true
        type: string
      source_sha:
        description: Full source SHA deployed to Railway/Vercel and promoted
        required: true
        type: string

permissions:
  contents: write
  packages: read

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Validate source, tag, and promoted registry digests
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo 'release_tag must use stable semver format vMAJOR.MINOR.PATCH.'
            exit 1
          }
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'source_sha must be a full lowercase Git commit SHA.'
            exit 1
          }
          test -n "$DOCKERHUB_USERNAME" || {
            echo 'DOCKERHUB_USERNAME repository variable is required.'
            exit 1
          }

          git fetch --force origin master "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/master)" || {
            echo 'The release workflow must run from the current origin/master head.'
            exit 1
          }
          git cat-file -e "$SOURCE_SHA^{commit}" || {
            echo 'source_sha does not identify a repository commit.'
            exit 1
          }
          git merge-base --is-ancestor "$SOURCE_SHA" origin/master || {
            echo 'source_sha must be an ancestor of the current master head.'
            exit 1
          }
          test "$SOURCE_SHA" = "$(git rev-parse "$RELEASE_TAG^{commit}")" || {
            echo 'The release tag does not point at source_sha.'
            exit 1
          }

          images=(foodflow-backend foodflow-migrate foodflow-admin foodflow-restaurant)
          dockerhub_registry="docker.io/$DOCKERHUB_USERNAME"
          ghcr_registry="ghcr.io/${GHCR_OWNER,,}"

          read_registry_digest() {
            local ref="$1"
            local output=""
            local digest=""
            local attempt
            for attempt in 1 2 3 4 5; do
              if output="$(docker buildx imagetools inspect "$ref" 2>&1)"; then
                digest="$(awk '/^Digest:/ {print $2; exit}' <<< "$output")"
                if [[ -n "$digest" ]]; then
                  printf '%s' "$digest"
                  return 0
                fi
              elif grep -Eqi 'unauthorized|denied|not found|manifest unknown|no such manifest' <<< "$output"; then
                printf '%s\n' "$output" >&2
                return 1
              fi
              echo "Registry inspect transient failure for $ref (attempt $attempt/5)." >&2
              if [[ "$attempt" -lt 5 ]]; then
                sleep 5
              fi
            done
            printf '%s\n' "$output" >&2
            return 2
          }

          for image in "${images[@]}"; do
            dockerhub_sha_ref="$dockerhub_registry/$image:sha-$SOURCE_SHA"
            dockerhub_release_ref="$dockerhub_registry/$image:$RELEASE_TAG"
            dockerhub_sha_digest="$(read_registry_digest "$dockerhub_sha_ref")"
            dockerhub_release_digest="$(read_registry_digest "$dockerhub_release_ref")"
            if ! test -n "$dockerhub_sha_digest" ||
              ! test "$dockerhub_sha_digest" = "$dockerhub_release_digest"; then
              echo "Docker Hub release digest mismatch for $dockerhub_release_ref"
              exit 1
            fi

            ghcr_sha_ref="$ghcr_registry/$image:sha-$SOURCE_SHA"
            ghcr_release_ref="$ghcr_registry/$image:$RELEASE_TAG"
            ghcr_sha_digest="$(read_registry_digest "$ghcr_sha_ref")"
            if ! test -n "$ghcr_sha_digest" ||
              ! test "$ghcr_sha_digest" = "$dockerhub_sha_digest"; then
              echo "GHCR SHA digest mismatch for $ghcr_sha_ref"
              exit 1
            fi

            ghcr_release_status=0
            if ghcr_release_digest="$(read_registry_digest "$ghcr_release_ref")"; then
              test "$ghcr_release_digest" = "$dockerhub_sha_digest" || {
                echo "GHCR release digest mismatch for $ghcr_release_ref"
                exit 1
              }
            else
              ghcr_release_status=$?
              if [[ "$ghcr_release_status" -ne 1 ]]; then
                echo "GHCR release inspection failed for $ghcr_release_ref after transient retries."
                exit "$ghcr_release_status"
              fi
              echo "::warning::GHCR release tag is unavailable for $image; verified the public SHA manifest instead."
              echo "GHCR semver unavailable for $image; public SHA digest verified." >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "$image verified at $dockerhub_sha_digest"
          done

      - name: Check out the verified release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_sha }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Generate source SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./
          format: spdx-json
          output-file: sbom-source.spdx.json

      - name: Generate promoted backend SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: docker.io/${{ vars.DOCKERHUB_USERNAME }}/foodflow-backend:${{ inputs.release_tag }}
          format: spdx-json
          output-file: sbom-image.spdx.json

      - name: Create GitHub Release after immutable promotion
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ inputs.source_sha }}
          body_path: CHANGELOG.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            CHANGELOG.md
            sbom-source.spdx.json
            sbom-image.spdx.json
