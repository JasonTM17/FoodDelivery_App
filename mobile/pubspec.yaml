name: foodflow_customer
description: FoodFlow - Food Delivery Customer App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2
  connectivity_plus: ^6.1.3

  # Location & Maps
  google_maps_flutter: ^2.12.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1

  # Storage & Permissions
  flutter_secure_storage: ^9.2.4
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Navigation
  go_router: ^14.8.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Generated API client
  api_client:
    path: packages/api_client

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/geo/
