services:
  postgres:
    build:
      context: ./infra/docker/postgres
    image: foodflow-postgres:16-3.4-pgvector
    container_name: foodflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-foodflow}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foodflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec --aof-use-rdb-preamble yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    # Pin local/self-host image; production uses Supabase Storage.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: foodflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrator
      args:
        BUILD_SHA: ${BUILD_SHA:-local}
    container_name: foodflow-migrate
    restart: "no"
    environment:
      # DATABASE_URL/DIRECT_URL are canonical so credentials with URL-special
      # characters are supplied safely as a fully URL-encoded connection URI.
      DATABASE_URL: ${DATABASE_URL:-postgresql://foodflow:foodflow_dev@postgres:5432/foodflow}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL:-postgresql://foodflow:foodflow_dev@postgres:5432/foodflow}}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_SHA: ${BUILD_SHA:-local}
    container_name: foodflow-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      REALTIME_PROVIDER: socketio
      STORAGE_PROVIDER: minio
      QUEUE_PROVIDER: bullmq
      DATABASE_URL: ${DATABASE_URL:-postgresql://foodflow:foodflow_dev@postgres:5432/foodflow}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL:-postgresql://foodflow:foodflow_dev@postgres:5432/foodflow}}
      REDIS_URL: redis://redis:6379
      DELIVERY_BASE_FEE_VND: "${DELIVERY_BASE_FEE_VND:-15000}"
      AUTH_PUBLIC_THROTTLE_LIMIT: "500"
      THROTTLER_TTL_MS: "${THROTTLER_TTL_MS:-60000}"
      THROTTLER_LIMIT: "${THROTTLER_LIMIT:-100}"
      JWT_SECRET: dev-secret-minimum-32-chars-xxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: dev-refresh-secret-minimum-32-chars-xxxxxxxxx
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      # Keep client credentials aligned with the MinIO root credentials.
      # Production uses Supabase Storage; these defaults are local-only.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: foodflow
      MINIO_PUBLIC_URL: http://localhost:9000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:3003,http://[::1]:3000,http://[::1]:3002,http://[::1]:3003}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:3001/api/healthz',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Background work must not share the API process: the worker owns queue
  # drains and dynamic RAG indexing, while the backend remains HTTP-only.
  worker:
    extends:
      service: backend
    container_name: foodflow-worker
    command: ["dist/workers/main.js"]
    ports: !reset []
    healthcheck:
      disable: true

  admin:
    build:
      context: ./web
      dockerfile: apps/admin/Dockerfile
      args:
        BUILD_SHA: ${BUILD_SHA:-local}
        NEXT_PUBLIC_APP_ENV: development
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
        NEXT_PUBLIC_REALTIME_PROVIDER: socketio
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3000}
        NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-openfreemap}
        NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
    container_name: foodflow-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_PUBLIC_REALTIME_PROVIDER: socketio
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:3000/api/healthz',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  restaurant:
    build:
      context: ./web
      dockerfile: apps/restaurant/Dockerfile
      args:
        BUILD_SHA: ${BUILD_SHA:-local}
        NEXT_PUBLIC_APP_ENV: development
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
        NEXT_PUBLIC_REALTIME_PROVIDER: socketio
        NEXT_PUBLIC_RESTAURANT_URL: ${NEXT_PUBLIC_RESTAURANT_URL:-http://localhost:3002}
        NEXT_PUBLIC_MAP_PROVIDER: ${NEXT_PUBLIC_MAP_PROVIDER:-openfreemap}
        NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
    container_name: foodflow-restaurant
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_PUBLIC_REALTIME_PROVIDER: socketio
      NEXT_PUBLIC_RESTAURANT_URL: http://localhost:3002
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:3002/api/healthz',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
