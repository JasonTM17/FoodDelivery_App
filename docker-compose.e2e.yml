name: foodflow-batch4-e2e

# Isolated release-test overlay. It deliberately avoids the default FoodFlow
# container names, ports, and volumes so a dirty/root development stack can
# keep running untouched while Batch 4 is validated from this worktree.
services:
  postgres:
    container_name: foodflow-batch4-e2e-postgres
    ports: !override
      - "15432:5432"

  redis:
    container_name: foodflow-batch4-e2e-redis
    ports: !override
      - "16379:6379"

  minio:
    container_name: foodflow-batch4-e2e-minio
    ports: !override
      - "19000:9000"
      - "19001:9001"

  migrate:
    container_name: foodflow-batch4-e2e-migrate

  backend:
    container_name: foodflow-batch4-e2e-backend
    ports: !override
      - "13001:3001"
    environment:
      CORS_ORIGINS: http://localhost:13000,http://localhost:13002
      MINIO_PUBLIC_URL: http://localhost:19000

  admin:
    container_name: foodflow-batch4-e2e-admin
    ports: !override
      - "13000:3000"
    build:
      args:
        NEXT_PUBLIC_APP_ENV: development
        NEXT_PUBLIC_API_URL: http://localhost:13001/api
        NEXT_PUBLIC_WS_URL: http://localhost:13001/events
        NEXT_PUBLIC_REALTIME_PROVIDER: socketio
        NEXT_PUBLIC_ADMIN_URL: http://localhost:13000
        NEXT_PUBLIC_MAP_PROVIDER: openfreemap
        NEXT_PUBLIC_MAP_STYLE_URL: https://tiles.openfreemap.org/styles/liberty
    environment:
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:13001/api
      NEXT_PUBLIC_WS_URL: http://localhost:13001/events
      NEXT_PUBLIC_REALTIME_PROVIDER: socketio
      NEXT_PUBLIC_ADMIN_URL: http://localhost:13000

  restaurant:
    container_name: foodflow-batch4-e2e-restaurant
    ports: !override
      - "13002:3002"
    build:
      args:
        NEXT_PUBLIC_APP_ENV: development
        NEXT_PUBLIC_API_URL: http://localhost:13001/api
        NEXT_PUBLIC_WS_URL: http://localhost:13001/events
        NEXT_PUBLIC_REALTIME_PROVIDER: socketio
        NEXT_PUBLIC_RESTAURANT_URL: http://localhost:13002
        NEXT_PUBLIC_MAP_PROVIDER: openfreemap
        NEXT_PUBLIC_MAP_STYLE_URL: https://tiles.openfreemap.org/styles/liberty
    environment:
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:13001/api
      NEXT_PUBLIC_WS_URL: http://localhost:13001/events
      NEXT_PUBLIC_REALTIME_PROVIDER: socketio
      NEXT_PUBLIC_RESTAURANT_URL: http://localhost:13002
