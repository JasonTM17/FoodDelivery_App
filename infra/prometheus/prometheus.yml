global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: foodflow-local

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: backend
    scrape_interval: 5s
    static_configs:
      - targets: ['backend:3000']
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
