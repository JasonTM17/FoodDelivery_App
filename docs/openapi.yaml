  # ═══════════════════════════════════════════════════════════════════
  # ORDERS — 10 endpoints
  # ═══════════════════════════════════════════════════════════════════
  /orders:
    post:
      tags: [orders]
      summary: Place a new order (idempotent via Idempotency-Key header per F4)
      operationId: placeOrder
      x-foodflow-actor: customer
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Client-side UUID for idempotency (required even on signup per F4)
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaceOrderRequest" }
      responses:
        "201": { description: "Order placed", content: { application/json: { schema: { $ref: "#/components/schemas/OrderResponse" } } } }
        "400": { description: "Validation error or cart empty" }
        "401": { description: "Not authenticated" }
        "402": { description: "Insufficient wallet balance" }
        "409": { description: "Duplicate idempotency key" }
        "422": { description: "Restaurant not accepting orders" }
    get:
      tags: [orders]
      summary: List customer orders
      operationId: getCustomerOrders
      x-foodflow-actor: customer
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200": { description: "Order list", content: { application/json: { schema: { $ref: "#/components/schemas/OrderListResponse" } } } }
        "401": { description: "Not authenticated" }

  /orders/{id}:
    get:
      tags: [orders]
      summary: Get order detail (customer/restaurant/driver scoped)
      operationId: getOrderDetail
      x-foodflow-actor: any-authenticated
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "Order detail", content: { application/json: { schema: { $ref: "#/components/schemas/OrderResponse" } } } }
        "401": { description: "Not authenticated" }
        "403": { description: "Not authorized to view this order" }
        "404": { description: "Order not found" }

  /orders/{id}/tracking:
    get:
      tags: [tracking]
      summary: Get real-time order tracking
      operationId: getOrderTracking
      x-foodflow-actor: any-authenticated
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "Tracking data", content: { application/json: { schema: { $ref: "#/components/schemas/TrackingResponse" } } } }
        "401": { description: "Not authenticated" }
        "404": { description: "Order not found or no driver assigned" }

  /orders/{id}/cancel:
    post:
      tags: [orders]
      summary: Cancel order (customer)
      operationId: cancelOrder
      x-foodflow-actor: customer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CancelOrderRequest" }
      responses:
        "200": { description: "Order cancelled", content: { application/json: { schema: { $ref: "#/components/schemas/OrderResponse" } } } }
        "400": { description: "Order cannot be cancelled at this stage" }
        "401": { description: "Not authenticated" }
        "404": { description: "Order not found" }

  /orders/{id}/review:
    post:
      tags: [reviews]
      summary: Submit review for order
      operationId: submitReview
      x-foodflow-actor: customer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReviewRequest" }
      responses:
        "201": { description: "Review submitted", content: { application/json: { schema: { $ref: "#/components/schemas/ReviewResponse" } } } }
        "400": { description: "Order not eligible for review" }
        "401": { description: "Not authenticated" }
        "409": { description: "Review already submitted for this order" }

  /restaurant/orders:
    get:
      tags: [orders]
      summary: List restaurant orders
      operationId: getRestaurantOrders
      x-foodflow-actor: restaurant
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200": { description: "Restaurant orders", content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OrderResponse" } } } } }
        "401": { description: "Not authenticated" }
        "403": { description: "Not a restaurant owner" }

  /restaurant/orders/{id}/status:
    patch:
