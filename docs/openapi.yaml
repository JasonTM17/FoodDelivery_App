    post:
      tags: [payments]
      summary: Create SePay QR code payment intent
      operationId: createSepayPayment
      x-foodflow-actor: customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, amount]
              properties:
                orderId: { type: string, format: uuid }
                amount: { type: integer, description: "VND" }
      responses:
        "200": { description: "Payment intent created", content: { application/json: { schema: { type: object, properties: { transactionRef: { type: string }, qrCodeUrl: { type: string, format: uri }, amount: { type: integer }, expiresAt: { type: string, format: date-time } } } } } }
        "400": { description: "Invalid order or already paid" }
        "401": { description: "Not authenticated" }

  /payments/sepay/status/{transactionRef}:
    get:
      tags: [payments]
      summary: Check payment status
