  # ═══════════════════════════════════════════════════════════════════
  # WALLET — 3 endpoints
  # ═══════════════════════════════════════════════════════════════════
  /users/wallet:
    get:
      tags: [wallet]
      summary: Get wallet balance (excludes pending topups per F8)
      operationId: getWallet
      x-foodflow-actor: any-authenticated
      responses:
        "200": { description: "Wallet snapshot", content: { application/json: { schema: { $ref: "#/components/schemas/WalletSnapshot" } } } }
        "401": { description: "Not authenticated" }

  /users/wallet/topup:
    post:
      tags: [wallet]
      summary: Initiate wallet topup via SePay
      operationId: topupWallet
      x-foodflow-actor: any-authenticated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: integer
                  minimum: 10000
                  description: "VND, minimum 10,000"
                returnUrl:
                  type: string
                  format: uri
      responses:
        "200": { description: "Topup initiated", content: { application/json: { schema: { type: object, properties: { transactionRef: { type: string }, qrCodeUrl: { type: string, format: uri }, amount: { type: integer }, expiresAt: { type: string, format: date-time } } } } } }
        "400": { description: "Invalid amount" }
        "401": { description: "Not authenticated" }

  /users/wallet/topup/{transactionRef}/status:
    get:
      tags: [wallet]
      summary: Check topup status
      operationId: checkTopupStatus
      x-foodflow-actor: any-authenticated
      parameters:
        - name: transactionRef
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: "Topup status", content: { application/json: { schema: { type: object, properties: { status: { type: string, enum: [pending, completed, failed] }, amount: { type: integer } } } } } }
        "401": { description: "Not authenticated" }
        "404": { description: "Transaction not found" }

