      operationId: getReferral
      x-foodflow-actor: any-authenticated
      responses:
        "200": { description: "Referral snapshot", content: { application/json: { schema: { $ref: "#/components/schemas/ReferralSnapshot" } } } }
        "401": { description: "Not authenticated" }

