version: '3.8'

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      target: builder
    command: pnpm start:dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    environment:
      - NODE_ENV=development
    ports:
      - "3001:3001"

  worker:
    command: pnpm ts-node src/workers/main.ts
    volumes:
      - ./backend/src:/app/src

  n8n:
    ports:
      - "5678:5678"

  bullboard:
    ports:
      - "3080:3080"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3100:3000"
