packages:
  - '.'

overrides:
  form-data: 4.0.6
  js-yaml@3.14.2: 3.15.0
  js-yaml@4.1.1: 4.2.0
  multer: 2.2.0
  ws: 8.21.0

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  msgpackr-extract: true
  prisma: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - bcrypt
  - msgpackr-extract
  - prisma
  - unrs-resolver
