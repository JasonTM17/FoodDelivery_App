packages:
  - '.'

overrides:
  form-data: 4.0.6
  js-yaml@3.14.2: 3.15.0
  js-yaml@4.1.1: 4.2.0
  multer: 2.2.0
  # Firebase Admin's storage stack still resolves uuid 9; use its fixed CommonJS-compatible release.
  uuid@9.0.1: 11.1.1
  ws: 8.21.0

allowBuilds:
  '@firebase/util': false
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  msgpackr-extract: true
  prisma: true
  protobufjs: false
  unrs-resolver: true

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - bcrypt
  - msgpackr-extract
  - prisma
  - unrs-resolver
