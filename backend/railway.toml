# Railway configuration for the HTTP API service only.
# Set the Railway service root directory to `backend`; the Dockerfile CMD starts
# the API. The worker and migrator are separate services with their own commands.

[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
