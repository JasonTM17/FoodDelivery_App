# cliff.toml — FoodFlow Changelog Configuration
# Generates professional release notes from conventional commits.

[changelog]
header = """
# Changelog

All notable changes to FoodFlow will be documented in this file.

"""

body = """
{% for group, commits in commits | group_by(attribute="group") %}
## {{ group | striptags | trim | upper_first }}

{% for commit in commits %}
- {% if commit.breaking %}**BREAKING:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
 ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
{%- endfor %}

{% endfor %}
"""

template = """
{% if version %}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}
- {% if commit.breaking %}**BREAKING:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
 ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
{%- endfor %}

{% endfor %}
{% else %}
## Unreleased

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}
- {% if commit.breaking %}**BREAKING:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
 ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
{%- endfor %}

{% endfor %}
{% endif %}
"""

trim = true
footer = """
---

_This changelog is auto-generated by [git-cliff](https://github.com/orhun/git-cliff)._
"""

postprocessors = [
  { pattern = '<!--(.*?)-->', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^style", group = "<!-- 4 -->Styling" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^docs", group = "<!-- 6 -->Documentation" },
  { message = "^build", group = "<!-- 7 -->Build System" },
  { message = "^ci", group = "<!-- 8 -->CI/CD" },
  { message = "^chore", group = "<!-- 9 -->Chores" },
  { message = "^revert", group = "<!-- 10 -->Reverts" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/JasonTM17/foodflow/issues/$1" },
  { pattern = "https://github.com/JasonTM17/foodflow/pull/(\\d+)", href = "https://github.com/JasonTM17/foodflow/pull/$1" },
]
limit_commits = 500
