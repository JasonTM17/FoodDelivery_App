# cliff.toml — FoodFlow Changelog Configuration
# Generates professional release notes from conventional commits.
# Compatible with git-cliff 2.13+ (single body template; no deprecated remote macros).

[changelog]
header = """
# Changelog

All notable changes to FoodFlow will be documented in this file.

"""

# Single body template only — a second `template` key caused
# "Macro namespace `self` was not found" under git-cliff 2.13.x in CI.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits -%}
- {% if commit.breaking %}**BREAKING:** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/JasonTM17/FoodDelivery_App/commit/{{ commit.id }}))
{% endfor %}

{% endfor %}
"""

trim = true
footer = """
---

_This changelog is auto-generated by [git-cliff](https://github.com/orhun/git-cliff)._
"""

postprocessors = [
  { pattern = '<!--(.*?)-->', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^style", group = "<!-- 4 -->Styling" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^docs", group = "<!-- 6 -->Documentation" },
  { message = "^build", group = "<!-- 7 -->Build System" },
  { message = "^ci", group = "<!-- 8 -->CI/CD" },
  { message = "^chore", group = "<!-- 9 -->Chores" },
  { message = "^revert", group = "<!-- 10 -->Reverts" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/JasonTM17/FoodDelivery_App/issues/$1" },
  { pattern = "https://github.com/JasonTM17/FoodDelivery_App/pull/(\\d+)", href = "https://github.com/JasonTM17/FoodDelivery_App/pull/$1" },
]
limit_commits = 500

[remote.github]
owner = "JasonTM17"
repo = "FoodDelivery_App"
